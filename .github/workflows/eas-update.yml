# Manually-triggered EAS Update (OTA) publisher.
#
# Ships the JS/asset bundle of the checked-out ref to an EAS Update channel
# with NO native rebuild — the fast path for JS-only changes. Because an OTA
# reaches users on their next launch, this runs the typecheck + test gate
# first and refuses to publish if either fails.
#
# ONE-TIME SETUP: add a repository secret named EXPO_TOKEN
#   Expo dashboard → Account settings → Access tokens → "Create token"
#   GitHub → repo Settings → Secrets and variables → Actions → New repository secret
#
# TO RUN: GitHub → Actions tab → "EAS Update (manual)" → "Run workflow" →
#   pick the channel + type a message. Defaults to the safer `preview` channel.
name: EAS Update (manual)

on:
  workflow_dispatch:
    inputs:
      channel:
        description: EAS Update channel to publish to
        type: choice
        default: preview
        options:
          - preview
          - production
      message:
        description: Update message (shown in the EAS dashboard)
        type: string
        required: true
        default: Manual OTA update

# Don't let two publishes to the same channel race each other.
concurrency:
  group: eas-update-${{ inputs.channel }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # OTA ships straight to users, so gate on correctness before publishing.
      - name: Typecheck
        run: npm run typecheck

      - name: Tests
        run: npm test -- --ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      # Inputs are passed via env (not inlined into the shell) to avoid
      # command injection from the free-text message.
      - name: Publish OTA update
        env:
          CHANNEL: ${{ inputs.channel }}
          MESSAGE: ${{ inputs.message }}
        run: |
          eas update \
            --channel "$CHANNEL" \
            --message "$MESSAGE ($(git rev-parse --short HEAD))" \
            --non-interactive

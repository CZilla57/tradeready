# The verify gate (typecheck / tests / lint) that has always run manually
# from the repo root — now also enforced on every push and PR so a red gate
# can't land unnoticed. Same three legs, same green criteria (lint runs with
# --max-warnings=0 via the package script).
#
# A fourth leg (2026-07-16): gitleaks secret scanning over the full git
# history. Known public-by-design client keys (Supabase publishable key,
# PostHog project key) are fingerprinted in .gitleaksignore; anything else
# fails the gate. --redact keeps any real finding out of the public CI logs.
name: Verify gate

on:
  push:
    branches: [master]
  pull_request:

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Tests
        run: npm test -- --ci

      - name: Lint
        run: npm run lint

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history — the scan covers every commit, not just HEAD

      - name: Secret scan (gitleaks, full history)
        run: |
          curl -sSL -o gitleaks.tar.gz https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz
          echo "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb  gitleaks.tar.gz" | sha256sum -c -
          tar -xzf gitleaks.tar.gz gitleaks
          ./gitleaks git . --no-banner --redact
